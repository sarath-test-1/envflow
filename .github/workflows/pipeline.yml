name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Run tests
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────
  # JOB 2 — Deploy to staging
  # ─────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/envflow_deploy
          chmod 600 ~/.ssh/envflow_deploy
          ssh-keyscan -p ${{ secrets.STAGING_PORT }} localhost >> ~/.ssh/known_hosts

      - name: Deploy to staging server
        run: |
          ssh -i ~/.ssh/envflow_deploy \
              -p ${{ secrets.STAGING_PORT }} \
              -o StrictHostKeyChecking=no \
              root@${{ secrets.STAGING_HOST }} \
              "bash -s" < scripts/deploy.sh staging \
              https://github.com/sarath-test-1/envflow.git \
              "${{ secrets.STAGING_ENV }}"

      - name: Health check staging
        run: |
          echo "Waiting for staging to be ready..."
          sleep 10
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health)
            if [ "$STATUS" = "200" ]; then
              echo "Staging is healthy!"
              curl -s http://localhost:3001/health
              exit 0
            fi
            echo "Attempt $i failed (status: $STATUS), retrying..."
            sleep 5
          done
          echo "Staging health check failed!"
          exit 1

  # ─────────────────────────────────────────
  # JOB 3 — Manual approval gate
  # ─────────────────────────────────────────
  approve-prod:
    name: Approve Production Deploy
    runs-on: self-hosted
    needs: deploy-staging
    environment: production

    steps:
      - name: Approved
        run: echo "Production deployment approved. Proceeding..."

  # ─────────────────────────────────────────
  # JOB 4 — Deploy to production
  # ─────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: self-hosted
    needs: approve-prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/envflow_deploy
          chmod 600 ~/.ssh/envflow_deploy
          ssh-keyscan -p ${{ secrets.PROD_PORT }} localhost >> ~/.ssh/known_hosts

      - name: Deploy to prod server
        run: |
          ssh -i ~/.ssh/envflow_deploy \
              -p ${{ secrets.PROD_PORT }} \
              -o StrictHostKeyChecking=no \
              root@${{ secrets.PROD_HOST }} \
              "bash -s" < scripts/deploy.sh prod \
              https://github.com/sarath-test-1/envflow.git \
              "${{ secrets.PROD_ENV }}"

      - name: Health check production
        run: |
          echo "Waiting for production to be ready..."
          sleep 10
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3002/health)
            if [ "$STATUS" = "200" ]; then
              echo "Production is healthy!"
              curl -s http://localhost:3002/health
              exit 0
            fi
            echo "Attempt $i failed (status: $STATUS), retrying..."
            sleep 5
          done
          echo "Production health check failed!"
          exit 1
