services:
  app:
    build:
      target: production
    ports:
      - "${HOST_PORT}:3000"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  postgres:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
